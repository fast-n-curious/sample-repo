apiVersion: v1
kind: Pod
metadata:
  name: debug-node
  namespace: backend
  labels:
    app: debug-node
    tier: ops
spec:
  # PSS Baseline violation: hostPID allows the pod to see all processes on the host
  hostPID: true
  containers:
    - name: debug
      image: busybox:1.36
      command: ["sleep", "3600"]
      securityContext:
        # PSS Restricted violation: runAsUser: 0 runs the container as root
        runAsUser: 0
        # PSS Restricted violation: allowPrivilegeEscalation not explicitly set to false
        allowPrivilegeEscalation: true
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
      volumeMounts:
        - name: host-proc
          mountPath: /host/proc
          readOnly: true
  volumes:
    # PSS Baseline violation: hostPath volume exposes the host filesystem to the container
    - name: host-proc
      hostPath:
        path: /proc
        type: Directory
